# Server
server.port=8086

# Application
spring.application.name=chat-service

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=true

# Database
spring.datasource.url=${CHAT_DB_URL:jdbc:mysql://localhost:3306/trustfundme_chat_db?createDatabaseIfNotExist=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Jackson Timezone
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# JWT Configuration
jwt.secret=${JWT_SECRET:TrustFundME2024SecretKeyForJWTTokenGenerationSecureRandomString64Chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Identity Service URL (for fetching user names)
identity.service.url=${IDENTITY_SERVICE_URL:http://localhost:8081}

# Notification Service URL
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8088}

# Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# LoadBalancer settings
spring.cloud.loadbalancer.ribbon.enabled=false
