# Server
server.port=8088

# Application
spring.application.name=notification-service

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=true

# Database
# REQUIRED: Set NOTIFICATION_DB_URL in .env file, defaults to trustfund_notifications if missing
spring.datasource.url=${NOTIFICATION_DB_URL:jdbc:mysql://localhost:3306/trustfundme_notification_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Identity Service (thông báo)
identity.service.url=${IDENTITY_SERVICE_URL:http://localhost:8081}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.transport.protocol=smtp

# JWT Configuration
# REQUIRED: Set JWT_SECRET in .env file (must match identity-service)
jwt.secret=${JWT_SECRET:TrustFundME2024SecretKeyForJWTTokenGenerationSecureRandomString64Chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
