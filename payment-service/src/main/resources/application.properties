# Server Configuration
server.port=8087

# Application Name
spring.application.name=payment-service

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=true

# Database Configuration
spring.datasource.url=${PAYMENT_DB_URL:jdbc:mysql://localhost:3306/trustfundme_payment_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:TrustFundME2024SecretKeyForJWTTokenGenerationSecureRandomString64Chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Service URLs (direct - no LoadBalancer needed for localhost)
app.campaign-service.url=${CAMPAIGN_SERVICE_URL:http://localhost:8082}
app.identity-service.url=${IDENTITY_SERVICE_URL:http://localhost:8081}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Disable Spring Cloud LoadBalancer for RestTemplate calls
# This prevents "No instances available" errors when using direct localhost URLs
spring.cloud.loadbalancer.ribbon.enabled=false

# PayOS Configuration
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}

# Pusher Configuration
pusher.key=${PUSHER_KEY:}
pusher.cluster=${PUSHER_CLUSTER:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
logging.file.name=payment-debug.log
