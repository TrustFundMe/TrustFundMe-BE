# Server Configuration
server.port=8080

# Application Name
spring.application.name=api-gateway

# JWT: same secret as Identity (from .env JWT_SECRET or same fallback as identity-service-h2)
jwt.secret=${JWT_SECRET:TrustFundME2024SecretKeyForJWTTokenGenerationSecureRandomString64Chars}

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=true
# Fetch registry every 5s (default 30s) to detect new services faster
eureka.client.registry-fetch-interval-seconds=5
# Heartbeat every 5s (default 30s)
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15

# LoadBalancer: disable cache so it always uses fresh Eureka data
spring.cloud.loadbalancer.cache.enabled=false

# Gateway Retry: retry on 503 (service unavailable) for GET requests
spring.cloud.gateway.default-filters[0]=Retry=3

# Gateway Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Routes Configuration
spring.cloud.gateway.routes[0].id=identity-service
spring.cloud.gateway.routes[0].uri=lb://identity-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**, /api/kyc/**

spring.cloud.gateway.routes[1].id=campaign-service
spring.cloud.gateway.routes[1].uri=lb://campaign-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/campaigns/**, /api/campaign-follows/**, /api/campaign-categories/**, /api/admin/tasks/**

spring.cloud.gateway.routes[2].id=feed-service
spring.cloud.gateway.routes[2].uri=lb://campaign-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/feed-posts/**

spring.cloud.gateway.routes[3].id=feed-service-forum
spring.cloud.gateway.routes[3].uri=lb://campaign-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/forum/**

spring.cloud.gateway.routes[4].id=identity-service-users
spring.cloud.gateway.routes[4].uri=lb://identity-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[5].id=identity-service-bank
spring.cloud.gateway.routes[5].uri=lb://identity-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/bank-accounts/**

spring.cloud.gateway.routes[6].id=media-service
spring.cloud.gateway.routes[6].uri=lb://media-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/media/**

spring.cloud.gateway.routes[7].id=flag-service
spring.cloud.gateway.routes[7].uri=lb://campaign-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/flags/**

spring.cloud.gateway.routes[8].id=chat-service
spring.cloud.gateway.routes[8].uri=lb://chat-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/conversations/**, /api/chat/conversations/**, /ws/**
spring.cloud.gateway.routes[8].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

spring.cloud.gateway.routes[9].id=campaign-service-goals
spring.cloud.gateway.routes[9].uri=lb://campaign-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/fundraising-goals/**

spring.cloud.gateway.routes[10].id=campaign-service-expenditures
spring.cloud.gateway.routes[10].uri=lb://campaign-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/expenditures/**

spring.cloud.gateway.routes[11].id=chat-service-appointments
spring.cloud.gateway.routes[11].uri=lb://chat-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/appointments/**

spring.cloud.gateway.routes[12].id=payment-service
spring.cloud.gateway.routes[12].uri=lb://payment-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.routes[13].id=notification-service
spring.cloud.gateway.routes[13].uri=lb://notification-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[14].id=user-post-seen-service
spring.cloud.gateway.routes[14].uri=lb://campaign-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/user-post-seen/**

spring.cloud.gateway.routes[15].id=identity-service-modules
spring.cloud.gateway.routes[15].uri=lb://identity-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/module-groups/**, /api/modules/**

spring.cloud.gateway.routes[16].id=campaign-service-internal-transactions
spring.cloud.gateway.routes[16].uri=lb://campaign-service
spring.cloud.gateway.routes[16].predicates[0]=Path=/api/internal-transactions/**

spring.cloud.gateway.routes[17].id=campaign-service-trust-score
spring.cloud.gateway.routes[17].uri=lb://campaign-service
spring.cloud.gateway.routes[17].predicates[0]=Path=/api/trust-score/**

spring.cloud.gateway.routes[18].id=identity-service-internal
spring.cloud.gateway.routes[18].uri=lb://identity-service
spring.cloud.gateway.routes[18].predicates[0]=Path=/api/internal/**

spring.cloud.gateway.routes[19].id=identity-service-emails
spring.cloud.gateway.routes[19].uri=lb://identity-service
spring.cloud.gateway.routes[19].predicates[0]=Path=/api/emails/**

spring.cloud.gateway.routes[20].id=trustfundme-ai
spring.cloud.gateway.routes[20].uri=${AI_SERVICE_URL:http://localhost:7000}
spring.cloud.gateway.routes[20].predicates[0]=Path=/api/generate-description, /api/parse-expenditure-excel, /api/ocr-kyc, /api/analyze-flag, /api/analyze-expenditure, /api/generate-suggestion-labels, /api/analyze-evidence, /api/generate-post

# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-origin-patterns=${ALLOWED_ORIGINS:http://localhost:3000}
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers
spring.cloud.gateway.globalcors.cors-configurations[/**].allow-credentials=true

# Actuator
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

# Multipart Configuration (to handle large uploads)
# Since this is a Reactive Gateway, we use WebFlux/Codec properties
spring.http.codec.max-in-memory-size=50MB
spring.webflux.multipart.max-file-size=50MB
spring.webflux.multipart.max-request-size=50MB
